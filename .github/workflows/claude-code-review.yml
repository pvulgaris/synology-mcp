name: Claude Code Review

# Direct-prompt PR reviewer (NOT the code-review plugin).
#
# The plugin (`/code-review:code-review`, what `/install-github-app` scaffolds)
# has two built-in skip gates tuned for human-team repos: "skip automated/bot
# PRs" and "skip if Claude already commented". This is a solo repo where every
# PR is Claude-authored (🤖 footer) and Claude is also the reviewer, so both
# gates fire against us and reviews silently no-op. See anthropics/claude-code
# #19618 (closed "not planned") and claude-code-action #1087 / #674 / #27358.
#
# This direct-prompt form has no plugin and no gates: the action auto-detects
# automation mode from the `prompt:` input on a pull_request event, Claude
# reviews the diff and posts comments every time. Simpler and predictable.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in the
            repository ${{ github.repository }}.

            Get the changes with `gh pr diff ${{ github.event.pull_request.number }}`
            and read the surrounding code as needed for context. Review this PR even
            though it is Claude-authored — do not skip it for being automated.

            Focus only on things that matter:
            - correctness bugs, logic errors, unhandled error/edge cases
            - security issues (injection, auth, secret handling, unsafe input)
            - violations of this repo's CLAUDE.md conventions
            Skip pure style/nitpick comments.

            Post each concrete issue as an inline comment on the exact line using
            the mcp__github_inline_comment__create_inline_comment tool. Then always
            post one summary comment with `gh pr comment` — list the issues found,
            or exactly "No issues found. Checked for bugs and CLAUDE.md compliance."
            if the diff is clean. Post the summary even when there are no issues.
          claude_args: |
            --max-turns 30
            --allowedTools "Read,Grep,Glob,Bash(gh:*),Bash(git:*),mcp__github_inline_comment__create_inline_comment"
