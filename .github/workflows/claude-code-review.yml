name: Claude Code Review

# Minimal direct-prompt PR reviewer (NOT the code-review plugin).
#
# The plugin (`/code-review:code-review`, what `/install-github-app` scaffolds)
# is tuned for human-team repos: it skips "automated/bot" PRs and skips PRs
# Claude already commented on. This is a solo repo where every PR is
# Claude-authored, so those gates silently switch the reviewer off. See
# anthropics/claude-code#19618 and claude-code-action#1087.
#
# This form has no plugin and no gates. The action auto-detects automation mode
# from the `prompt:` on a pull_request event; Claude reads the diff and posts a
# single summary comment via `gh pr comment`. That's the whole thing — no inline
# comments, no MCP tools — so it's easy to reason about.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  claude-review:
    # Fork PRs get no secrets on a public repo, so auth would fail every push.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in the
            repository ${{ github.repository }}. Get the diff with
            `gh pr diff ${{ github.event.pull_request.number }}` and read the
            surrounding code for context. Review it even though it is Claude-authored.

            Then post ONE summary comment with `gh pr comment` listing any real
            correctness, security, or CLAUDE.md-convention issues (skip style
            nitpicks), or exactly "No issues found. Checked for bugs and CLAUDE.md
            compliance." if the diff is clean. Always post the comment.
          claude_args: '--allowedTools "Read,Grep,Glob,Bash(gh:*)" --max-turns 30'
