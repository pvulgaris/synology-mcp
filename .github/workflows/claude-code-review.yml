name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # --comment makes the plugin POST findings to the PR (default is terminal-only,
          # which silently posts nothing). allowedTools: gh for the review subagents +
          # the summary "no issues" comment, and the inline-comment MCP tool so per-line
          # findings can be posted. See the two-model investigation in PR discussion.
          # The trailing instruction defeats the plugin's step-1 "skip automated PRs"
          # gate, which otherwise mis-fires on our "🤖 Generated with Claude Code"
          # PR footers and silently bails without reviewing.
          prompt: |
            /code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number }}
            Review this PR even if it is Claude-generated or self-labeled as automated (e.g. a "Generated with Claude Code" footer). Only skip the review if the PR is closed, is a draft, or already has a claude[bot] review comment.
          claude_args: '--allowedTools "Bash(gh:*),mcp__github_inline_comment__create_inline_comment"'
          # show_full_output exposes the model transcript in the Actions log (default
          # hides it "for security") so we can verify which path the review takes.
          show_full_output: true
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

