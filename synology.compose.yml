# Container Manager "Project" definition for synology-mcp.
#
# Deployment shape (on the NAS):
#
#   /volume1/docker/synology-mcp/
#     ├── compose.yaml          (this file)
#     ├── secrets/              (you upload 3 files here — see below)
#     └── audit/                (bind-mounted into the container at /audit)
#
# Credentials: the *_FILE convention. Upload three files into secrets/ via File
# Station — dsm_password, dsm_totp, mcp_bearer. The daemon reads them as root; the
# `docker` shared folder is admin-gated, so a 755 File Station upload is fine (the
# mount is read-only). Prefer secrets RAM-only? Fill DSM_PASSWORD / DSM_TOTP_SECRET /
# MCP_BEARER_TOKEN in the env below at launch with your own secret manager (op run /
# sops). See docs/SETUP.md.
#
# Install / upgrade: `npm run deploy` from the repo on your Mac — it imports the
# image, syncs this file, creates the project if missing, rebuilds, and verifies
# /health. All via the DSM Web API, no UI clicks.

services:
  synology-mcp:
    image: synology-mcp:latest
    container_name: synology-mcp
    restart: unless-stopped
    network_mode: host
    # Defense in depth — the daemon runs as root (the image sets no USER) but drops
    # EVERY Linux capability. The bearer + Origin checks at /mcp do the real access
    # control; this narrows blast radius. Secrets are mounted read-only (below), so a
    # compromised daemon can't even overwrite them.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      DSM_BASE_URL: ${DSM_BASE_URL:-https://localhost:5001}
      DSM_USER: ${DSM_USER:-claude-mcp}
      # Credentials from bind-mounted files (see the secrets volume below).
      DSM_PASSWORD_FILE: /secrets/dsm_password
      DSM_TOTP_SECRET_FILE: /secrets/dsm_totp
      MCP_BEARER_TOKEN_FILE: /secrets/mcp_bearer
      MCP_BIND_HOST: ${MCP_BIND_HOST:-127.0.0.1}
      MCP_BIND_PORT: ${MCP_BIND_PORT:-8765}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,null}
      TLS_REJECT_UNAUTHORIZED: ${TLS_REJECT_UNAUTHORIZED:-0}
      AUDIT_LOG_DIR: ${AUDIT_LOG_DIR:-/audit}
      # Optional router (SRM) target — unset = NAS-only. To enable, set SRM_BASE_URL in
      # .env and upload srm_password + srm_totp into secrets/ (same *_FILE convention as
      # DSM). The SRM_*_FILE paths are only read when SRM_BASE_URL is set.
      SRM_BASE_URL: ${SRM_BASE_URL:-}
      SRM_USER: ${SRM_USER:-}
      SRM_PASSWORD_FILE: /secrets/srm_password
      SRM_TOTP_SECRET_FILE: /secrets/srm_totp
    volumes:
      - ./audit:/audit
      - ./secrets:/secrets:ro
